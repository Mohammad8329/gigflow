name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-validation:
    name: Validate Backend (Node + TS)
    runs-on: ubuntu-latest
    
    # This automatically runs all scripts in this job inside the backend folder!
    defaults:
      run:
        working-directory: ./backend 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install Backend Dependencies
        run: npm ci

      - name: Verify TypeScript Compilation
        run: npm run build
  
  frontend-validation:
    name: Validate Frontend (Vite + TS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
  
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
  
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
  
      - name: Install Frontend Dependencies
        run: npm ci
  
      - name: Verify TypeScript Compilation
        run: npm run build