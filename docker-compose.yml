version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: smart_leads_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: smart_leads_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/smart_leads
      - JWT_SECRET=your_super_secret_jwt_key_here
      - NODE_ENV=production
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Tells the frontend container to talk to your local machine's mapped port
        - VITE_API_URL=http://localhost:5000/api 
    container_name: smart_leads_frontend
    ports:
      - "3000:80" # Maps localhost:3000 to the container's Nginx port 80
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data: